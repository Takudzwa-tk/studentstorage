<section class="payment-page">

<h1>EFT Payment</h1>

<div class="payment-grid">

<div class="bank-card">

<h2>Banking Details</h2>

<div class="detail">
<strong>Bank</strong>
<p>Capitec Bank</p>
</div>

<div class="detail">
<strong>Account Name</strong>
<p>Student Storage</p>
</div>

<div class="detail">
<strong>Student Storage</strong>
<p>1234567890</p>
</div>

<div class="detail">
<strong>Branch Code</strong>
<p>470010</p>
</div>

<div class="detail">
<strong>Reference</strong>
<p id="reference"></p>
</div>

</div>

<div class="qr-card">

<h2>Scan To Pay</h2>

<img src="images/qr.png" alt="QR Code">

<p>

Scan using your banking app or scanning app.

</p>

</div>

</div>

<div class="upload-card">

<h2>Upload Proof of Payment</h2>

<input
type="file"
id="pop">

<br><br>

<button id="paidBtn">

I've Paid

</button>

</div>

</section>
