<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Book Storage</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

<header>

    <nav class="navbar">

        <div class="logo">
            Student Storage
        </div>

        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="booking.html">Book Now</a></li>
            <li><a href="payment.html">Payments</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>

    </nav>

</header>

<section class="booking-section">

    <div class="booking-container">

        <h1>Book Your Student Storage</h1>

        <p>Choose your campus and complete your booking.</p>

        <form class="booking-form">

            <!-- Campus -->
            <div class="form-group full">
                <label for="campus">Select Campus</label>

                <select id="campus">

                    <option value="">Choose Campus</option>

                    <option value="Richards Bay">
                        UNIZULU Richards Bay
                    </option>

                    <option value="UNIZULU DLANGEZWA">
                        UNIZULU Main Campus
                    </option>

                    <option value="Richtech">
                        RICHTECH
                    </option>

                    <option value="ESIKHAWINI">
                        ESIKHAWINI 
                    </option>


                </select>
            </div>

            <!-- Name & Phone -->
            <div class="form-row">

                <div class="form-group">
                    <label for="name">Full Name</label>

                    <input
                        type="text"
                        id="name"
                        placeholder="Enter your full name">
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number</label>

                    <input
                        type="tel"
                        id="phone"
                        placeholder="Enter your phone number">
                </div>

            </div>

            <!-- Package & Date -->
            <div class="form-row">

                <div class="form-group">

                    <label for="package">Storage Package</label>

                    <select id="package">

                        <option>Small Package</option>
                        <option>Medium Package</option>
                        <option>Large Package</option>

                    </select>

                </div>

                <div class="form-group">

                    <label for="date">Pickup Date</label>

                    <input
                        type="date"
                        id="date">

                </div>

            </div>

            <!-- Items -->
            <div class="form-group full">

                <label for="items">Items To Store</label>

                <textarea
                    id="items"
                    rows="6"
                    placeholder="Example: 2 bags, suitcase, boxes"></textarea>

            </div>

         <button
    type="button"
    class="whatsapp-btn"
    onclick="sendBooking()">
     Book via WhatsApp
</button>

        </form>

    </div>

</section>

<script src="js/booking.js"></script>

</body>

</html>
