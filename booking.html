<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Book Storage</title>

<link rel="stylesheet" href="css/style.css">

</head>


<body>


<header>

<nav class="navbar">

<div class="logo">
Student Storage
</div>

<ul class="nav-links">

<li><a href="index.html">Home</a></li>
<li><a href="booking.html">Book Now</a></li>
<li><a href="payment.html">Payments</a></li>
<li><a href="contact.html">Contact</a></li>

</ul>

</nav>

</header>



<section class="booking-section">


<div class="booking-container">


<h1>
Book Your Student Storage
</h1>


<p>
Choose your campus and complete your booking.
</p>



<label>
Select Campus
</label>


<select id="campus">

<option value="">
Choose Campus
</option>

<option value="Richards Bay">
UNIZULU Richards Bay
</option>


<option value="Main Campus">
UNIZULU Main Campus
</option>


<option value="Richtech">
RICHTECH
</option>


</select>



<label>
Full Name
</label>


<input 
type="text" 
id="name"
placeholder="Enter your name"
>



<label>
Phone Number
</label>


<input 
type="tel"
id="phone"
placeholder="Your phone number"
>




<label>
Items To Store
</label>


<textarea 
id="items"
placeholder="Example: 2 bags, suitcase, boxes">
</textarea>




<label>
Storage Package
</label>


<select id="package">


<option>
Small Package
</option>


<option>
Medium Package
</option>


<option>
Large Package
</option>


</select>




<label>
Pickup Date
</label>


<input 
type="date"
id="date"
>




<button onclick="sendBooking()">

Book Via WhatsApp

</button>



</div>


</section>



<script src="js/booking.js"></script>


</body>

</html>
